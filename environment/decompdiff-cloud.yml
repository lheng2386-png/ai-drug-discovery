  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.8
  - numpy=1.23.5
  - pytorch=1.13.1
  - pytorch-cuda=11.6
  - pyg=2.2.0
  - rdkit=2022.03.2
  - openbabel
  - mdtraj
  - tensorboard
  - pyyaml
  - easydict
  - python-lmdb
